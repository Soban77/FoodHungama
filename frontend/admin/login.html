<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login — FoodHungama</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-wrap">
  <div class="login-card">
    <h1>FoodHungama — Admin</h1>
    <span class="small">Sign in with admin credentials</span>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" class="input" type="email" placeholder="admin@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" class="input" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="form-actions">
      <button id="login" class="btn primary">Login</button>
    </div>
    <p id="err" class="warn small" style="display:none; margin-top:12px;"></p>
  </div>
  <script type="module" src="admin-login.js"></script>
</body>
</html>
