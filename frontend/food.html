<!DOCTYPE html>
<html>
  <head>
    <title>Food</title>
    <link rel="stylesheet" href="Styles/food.css">
    <link rel="stylesheet" href="Styles/general.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="icon" href="">
  </head>

  <body>
    <header class="home-nav js-home-nav">
      <div class="home-nav-profile">
        <img src="Images/blue-profile-icon-free-png.webp" class="js-home-profile">
      </div>

      <div class="home-nav-title">
        <h1 class="js-home-title">FoodHungama</h1>
      </div>

      <div class="home-nav-fav-wallet">
        <img src="Images/Heart-icon.png" class="js-home-favourite">
        <img src="Images/Cart-icon1.jpg" class="js-home-cart">
      </div>
    </header>

    <section class="Review-page js-Review-page">
      <div class="Reviews-page-header js-Reviews-page-header-1">
        <h1>Reviews</h1>
        <p class="js-Review-cross">&#x274c;</p>
      </div>

      <div class="Reviews-page-header-2 js-Reviews-page-header-2">
        <h1>Reviews</h1>
        <p class="js-Review-cross-2">&#x274c;</p>
      </div>

      <p class="Review-page-p js-Review-page-p">Broadway Pizza</p>

      <div class="Review-page-div1">

        <div class="Review-page-div1-1">
          <h1 class="js-Review-rating">4.9</h1>
          <img src="Images/ratings/rating-45.png" alt="" class="js-Review-img-r" onerror="this.style.display='none'">
          <p>All Ratings (<span class="js-Review-count">0</span>)</p>
        </div>

        <div class="Review-page-div1-2">

          <div class="div1-2-1">
            <p>5</p>
            <img src="Images/Rating-Star.png">
            <div>
              <div></div>
            </div>
          </div>

          <div class="div1-2-2">
            <p>4</p>
            <img src="Images/Rating-Star.png">
            <div>
              <div></div>
            </div>
          </div>

          <div class="div1-2-3">
            <p>3</p>
            <img src="Images/Rating-Star.png">
            <div>
              <diV></diV>
            </div>
          </div>

          <div class="div1-2-4">
            <p>2</p>
            <img src="Images/Rating-Star.png">
            <div>
              <div></div>
            </div>
          </div>

          <div class="div1-2-5">
            <p>1</p>
            <img src="Images/Rating-Star.png">
            <div>
              <div></div>
            </div>
          </div>

        </div>
      </div>

      <div class="Review-page-div2 js-Review-list-wrap">
        <div class="Review-form-wrap js-Review-form-wrap">
          <h3>Write a review</h3>
          <form class="Review-form js-Review-form">
            <label>Rating</label>
            <select class="Review-form-rating js-Review-form-rating" required>
              <option value="5">5 – Excellent</option>
              <option value="4">4 – Good</option>
              <option value="3">3 – Okay</option>
              <option value="2">2 – Poor</option>
              <option value="1">1 – Bad</option>
            </select>
            <label>Comment</label>
            <textarea class="Review-form-comment js-Review-form-comment" rows="3" placeholder="Share your experience..."></textarea>
            <button type="submit" class="Review-form-submit">Submit review</button>
          </form>
        </div>
        <div class="Review-list js-Review-list">
          <!-- filled by JS -->
        </div>
      </div>
    </section>

    <section class="All-carts js-All-carts">

      <div class="All-carts-1">
        <h1>All carts</h1>
        <p class="js-cart-cross">&#x274c;</p>
      </div>

      <section class="All-carts-2 js-All-carts-2">
      </section>

      <div class="Empty-cart js-Empty-cart">
        <h1>Empty Cart</h1>
      </div>

    </section>

    <section class="food-main js-food-main">
      <section class="food-main-restaurant js-food-main-restaurant">
        
      </section>

      <div class="food-main-favourite js-food-main-favourite">
        <div class="food-main-favourite-1">
          <img src="Images/heart-black-full-icon.jpg" class="js-favourite-image">
          <p class="js-favourite-p">Add to favourites</p>
        </div>
      </div>

      <section class="food-main-item">
        <div class="food-main-item-start js-food-main-item-start">
          
        </div>

        <div class="food-main-item-2 js-food-main-item-2">
          <div class="food-main-item-2-1">
            <h1>Delivery</h1>
          </div>
          <div class="food-main-item-2-2">
            <h1>Your items</h1>
            <div class="food-main-item-2-2-start js-food-main-item-2-2-start">
              
            </div>
          </div>
          <div class="food-main-item-2-3">
            <div>
              <h1>Total <span>(incl. fees and tax)</span></h1>
              <p>Rs. <span class="js-total-price">0</span></p>
            </div>
            <button class="js-review-payment-button">Review payment and address</button>
          </div>
        </div>
      </section>

      <section class="food-empty-container js-food-empty-container">
        <div class="food-empty">
          No Food Items Available Yet
        </div>
      </section>
    </section>

    <script src="Scripts/food.js" type="module"></script>
  </body>
</html>
