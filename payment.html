<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment — FoodHungama</title>
  <link rel="stylesheet" href="Styles/general.css" />
  <link rel="stylesheet" href="Styles/payment.css" />
</head>
<body>
  <header class="home-nav js-payment-nav">
    <div class="home-nav-profile">
      <img src="Images/blue-profile-icon-free-png.webp" alt="Profile" class="js-payment-profile" />
    </div>
    <div class="home-nav-title">
      <h1 class="js-payment-title">FoodHungama</h1>
    </div>
    <div class="home-nav-fav-wallet">
      <a href="payment.html" class="payment-nav-cart-link" aria-current="page">Checkout</a>
    </div>
  </header>

  <main class="payment-main">
    <div class="payment-container">
      <h1 class="payment-page-title">Review &amp; Pay</h1>

      <section class="payment-grid">
        <!-- Order summary -->
        <div class="pay-box payment-summary">
          <h2>Order Summary</h2>
          <div id="order-list" class="order-list"></div>
          <p class="pay-line pay-subtotal">Subtotal: <strong id="subtotal">0</strong> PKR</p>
          <div class="coupon-section">
            <input id="coupon-input" class="pay-input" type="text" placeholder="Coupon code" />
            <button type="button" id="apply-coupon" class="btn btn-coupon">Apply</button>
          </div>
          <p id="discount-text" class="discount-text" aria-live="polite"></p>
          <p class="pay-line pay-grand">Grand Total: <strong id="grand-total">0</strong> PKR</p>
        </div>

        <!-- Delivery info -->
        <div class="pay-box">
          <h2>Delivery Info</h2>
          <label for="fullname">Full Name</label>
          <input id="fullname" class="pay-input" type="text" placeholder="Your name" />
          <label for="phone">Phone</label>
          <input id="phone" class="pay-input" type="tel" placeholder="03XX XXXXXXX" />
          <label for="address">Address</label>
          <textarea id="address" class="pay-input pay-textarea" rows="3" placeholder="Street, city, area"></textarea>
        </div>

        <!-- Payment method -->
        <div class="pay-box">
          <h2>Payment Method</h2>
          <label class="pay-radio">
            <input type="radio" name="method" value="cod" checked /> Cash on Delivery
          </label>
          <label class="pay-radio">
            <input type="radio" name="method" value="card" /> Card (demo)
          </label>
        </div>
      </section>

      <div class="payment-actions">
        <button type="button" id="place-order" class="pay-btn">Place Order</button>
        <a href="home.html" class="pay-back">← Back to Home</a>
      </div>
    </div>
  </main>

  <script type="module" src="Scripts/payment.js"></script>
</body>
</html>
